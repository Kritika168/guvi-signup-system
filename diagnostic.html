<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Diagnostic Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .log-success { color: green; }
        .log-error { color: red; }
        .log-warning { color: orange; }
        .log-info { color: blue; }
        #logOutput { 
            background: #000; 
            color: #0f0; 
            padding: 15px; 
            font-family: monospace; 
            height: 500px; 
            overflow-y: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2>🔍 Profile Update Diagnostic Tool</h2>
        <p class="text-muted">This will test your profile update step by step</p>
        
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Step 1: Check Session</h5>
                        <button id="checkSession" class="btn btn-primary">Check Session</button>
                        <div id="sessionInfo" class="mt-2"></div>
                    </div>
                </div>
                
                <div class="card mt-3">
                    <div class="card-body">
                        <h5>Step 2: Test Update</h5>
                        <button id="testUpdate" class="btn btn-primary" disabled>Test Profile Update</button>
                        <div id="updateInfo" class="mt-2"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <h5>Console Log:</h5>
                <div id="logOutput"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const logOutput = document.getElementById('logOutput');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const className = `log-${type}`;
            logOutput.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logOutput.scrollTop = logOutput.scrollHeight;
            console.log(message);
        }

        let sessionToken = null;
        let userId = null;

        // Check session button
        document.getElementById('checkSession').addEventListener('click', async function() {
            log('=== CHECKING SESSION ===', 'info');
            
            // Check localStorage
            sessionToken = localStorage.getItem('sessionToken');
            userId = localStorage.getItem('userId');
            const username = localStorage.getItem('username');
            const email = localStorage.getItem('email');
            
            const sessionInfo = document.getElementById('sessionInfo');
            
            if (sessionToken && userId) {
                log('✓ Session found in localStorage', 'success');
                log(`User ID: ${userId}`, 'info');
                log(`Username: ${username}`, 'info');
                log(`Email: ${email}`, 'info');
                log(`Session Token: ${sessionToken.substring(0, 20)}...`, 'info');
                
                sessionInfo.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Session Active</strong><br>
                        User: ${username} (${email})<br>
                        User ID: ${userId}
                    </div>
                `;
                
                document.getElementById('testUpdate').disabled = false;
                
                // Test if session is valid with server
                log('Testing session with server...', 'info');
                try {
                    const response = await fetch('/api/get_profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sessionToken: sessionToken,
                            userId: userId
                        })
                    });
                    
                    const data = await response.json();
                    log('Server response: ' + JSON.stringify(data), 'info');
                    
                    if (data.success) {
                        log('✓ Session is VALID with server', 'success');
                    } else {
                        log('✗ Session INVALID: ' + data.message, 'error');
                        sessionInfo.innerHTML += `<div class="alert alert-warning mt-2">Session may be expired. Try logging out and back in.</div>`;
                    }
                } catch (error) {
                    log('✗ Error testing session: ' + error.message, 'error');
                }
            } else {
                log('✗ NO SESSION found', 'error');
                log('You need to login first', 'warning');
                sessionInfo.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>✗ No Active Session</strong><br>
                        Please <a href="login.html">login</a> first.
                    </div>
                `;
            }
        });

        // Test update button
        document.getElementById('testUpdate').addEventListener('click', async function() {
            log('\n=== TESTING PROFILE UPDATE ===', 'info');
            const updateInfo = document.getElementById('updateInfo');
            
            const updateData = {
                sessionToken: sessionToken,
                userId: parseInt(userId),
                fullName: 'Diagnostic Test User',
                dob: '1990-01-01',
                age: '34',
                contact: '1234567890',
                address: 'Test Address',
                city: 'Test City',
                country: 'Test Country'
            };
            
            log('Sending update request...', 'info');
            log('Data: ' + JSON.stringify(updateData, null, 2), 'info');
            
            try {
                const response = await fetch('/api/update_profile', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updateData)
                });
                
                log('Response status: ' + response.status, 'info');
                log('Response type: ' + response.headers.get('content-type'), 'info');
                
                const data = await response.json();
                log('Response data: ' + JSON.stringify(data), 'info');
                
                if (data.success) {
                    log('✓✓✓ UPDATE SUCCESSFUL! ✓✓✓', 'success');
                    updateInfo.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✓ Profile Updated Successfully!</strong><br>
                            ${data.message}
                        </div>
                    `;
                    
                    // Verify
                    log('\nVerifying update...', 'info');
                    const verifyResponse = await fetch('/api/get_profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            sessionToken: sessionToken,
                            userId: userId
                        })
                    });
                    const verifyData = await verifyResponse.json();
                    log('Verified profile: ' + JSON.stringify(verifyData.profile, null, 2), 'success');
                    
                } else {
                    log('✗✗✗ UPDATE FAILED ✗✗✗', 'error');
                    log('Error message: ' + data.message, 'error');
                    updateInfo.innerHTML = `
                        <div class="alert alert-danger">
                            <strong>✗ Update Failed</strong><br>
                            ${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                log('✗✗✗ EXCEPTION OCCURRED ✗✗✗', 'error');
                log('Error: ' + error.message, 'error');
                log('Stack: ' + error.stack, 'error');
                updateInfo.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>✗ Error</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        });

        // Auto-run session check on page load
        log('Page loaded. Click "Check Session" to begin diagnostics.', 'info');
    </script>
</body>
</html>
