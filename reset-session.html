<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Reset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h3>🔄 Session Expired</h3>
                        <p class="mt-3">Your session has expired. Click the button below to clear old session and login again.</p>
                        
                        <button id="clearSession" class="btn btn-primary btn-lg mt-3">
                            Clear Session & Go to Login
                        </button>
                        
                        <div id="message" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('clearSession').addEventListener('click', function() {
            // Clear all session data
            localStorage.removeItem('sessionToken');
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            localStorage.removeItem('email');
            
            // Clear all localStorage to be safe
            localStorage.clear();
            
            document.getElementById('message').innerHTML = 
                '<div class="alert alert-success">✓ Session cleared! Redirecting to login...</div>';
            
            // Redirect to login page after 1 second
            setTimeout(function() {
                window.location.href = '/login.html';
            }, 1000);
        });
    </script>
</body>
</html>
